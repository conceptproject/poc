<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

    <title>Basic Webapp</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="container">
        <h1>WebSDK 5.0 Testing</h1>

        <div class="form-row">
            <button id="getDocumentImages">Get Document Front</button>
             <button id="getDocumentBack">Get Document Back</button>
           
            <button id="capture_selfie_button">Capture Selfie</button>
        </div>

        <div id="message" class="message"></div>
        <hr>

        <div class="capture-wrapper">
            <div id="idmetrics-container"></div>
        </div>

        <div class="info"></div>
    </div>

    <script>
        let captureFw;

        window.onCaptureFrameworkLoaded = async function () {
            const detectionProvider = 1;

            const languageConfig = {
                lang: "en",
                localizedStrings: {}
            };

            captureFw = window.IDMetricsCaptureFramework;
            await captureFw.setDetectionProvider(detectionProvider, languageConfig);

            setupDocumentCapture();
            setupDocumentBackCapture(); 
            setupSelfieCapture();
        };

        function setupDocumentCapture() {
            const documentSettings = new DocumentSettings();
            documentSettings.captureMode = "Manual";
            documentSettings.documentType = "License";
            documentSettings.documentSide = "Front";

            const button = document.getElementById("getDocumentImages");

            button.addEventListener("click", () => {
                // ✅ NEW CaptureResult PER CAPTURE
                const captureResult = new CaptureResult();

                captureResult.setOnFinish(() => {
                    const dataUri = captureResult.result;
                    if (typeof dataUri !== "string") return;

                    let img = document.getElementById("capturedPreview");
                    if (!img) {
                        img = document.createElement("img");
                        img.id = "capturedPreview";
                        img.style.width = "200px";
                        img.style.height = "auto";
                        document.querySelector(".info").appendChild(img);
                    }
                    img.src = dataUri;
                });

                captureResult.setOnAborted(() => {
                    console.log("Document capture aborted");
                });

                captureResult.setOnEvent((code, description) => {
                    console.log(code, description);
                });

                captureFw.scanDocument(documentSettings, captureResult);
            });
        }

 function setupDocumentBackCapture() {
    const documentSettings = new DocumentSettings();
    documentSettings.captureMode = "Manual";
    documentSettings.documentType = "License";
    documentSettings.documentSide = "Back";   // 👈 Back side

    const button = document.getElementById("getDocumentBack");
    button.addEventListener("click", () => {
        const captureResult = new CaptureResult();

        captureResult.setOnFinish(() => {
            const dataUri = captureResult.result;
            console.log("Back side captured:", dataUri);  // 👈 Print to console

            let img = document.getElementById("capturedBackPreview");
            if (!img) {
                img = document.createElement("img");
                img.id = "capturedBackPreview";
                img.style.width = "200px";
                img.style.height = "auto";
                document.querySelector(".info").appendChild(img);
            }
            img.src = dataUri;
        });

        captureResult.setOnAborted(() => {
            console.log("Back-side capture aborted");
        });

        captureResult.setOnEvent((code, description) => {
            console.log("Event:", code, description);
        });

        captureFw.scanDocument(documentSettings, captureResult);
    });
}       
  function setupSelfieCapture() {
    const selfieSettings = new SelfieSettings();
    selfieSettings.cameraFacing = "user";

    const button = document.getElementById("capture_selfie_button");
    button.addEventListener("click", () => {
        const selfieResult = new CaptureResult();

    selfieResult.setOnFinish(() => {
        const dataUri = selfieResult.result;

        if (!dataUri || typeof dataUri !== "string") {
            console.error("Selfie capture failed — result is empty or undefined:", dataUri);
            return;
        }

        console.log("Selfie Base64:", dataUri);

        let img = document.getElementById("selfiePreview");
        if (!img) {
            img = document.createElement("img");
            img.id = "selfiePreview";
            img.style.width = "200px";
            img.style.height = "auto";
            document.querySelector(".info").appendChild(img);
        }

        img.src = dataUri;
    });

        selfieResult.setOnAborted(() => {
            console.log("Selfie capture aborted");
        });

        selfieResult.setOnEvent((code, description) => {
            console.log("Selfie event:", code, description);
        });

        captureFw.scanSelfie(selfieSettings, selfieResult);
    });
}
  
  </script>

    <script src="IDMetricsCaptureFramework.js"></script>
</body>
</html>
``
